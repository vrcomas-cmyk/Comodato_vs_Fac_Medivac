<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Comodatos MEDIVAC</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0f1720;--panel:#16212e;--panel2:#1c2a3a;--line:#26384c;--txt:#e6edf3;--muted:#8aa0b6;--accent:#1f9d6b;--accent2:#2f81f7}
/* Tema de marca DEGASA (verde + café) */
:root[data-theme="marca"]{--bg:#11160c;--panel:#1a2113;--panel2:#232d18;--line:#3a4a26;--txt:#eef3e6;--muted:#a9b78f;--accent:#76b82a;--accent2:#a67c3d}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,Segoe UI,system-ui,Arial,sans-serif;font-size:13px}
header{padding:14px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;background:linear-gradient(90deg,#13202c,#16212e)}
.logo{height:32px;width:auto;display:block}
.themebtn{margin-left:8px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:6px 11px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.themebtn:hover{border-color:var(--accent)}
.themebtn .sw{width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2))}
h1{font-size:15px;margin:0;font-weight:700}header .sub{color:var(--muted);font-size:11px}
.sync{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
#syncState.warn{color:#e0a325}#syncState.ok{color:#43c98e}
.tabs{display:flex;gap:6px;padding:10px 22px 0;background:#13202c;border-bottom:1px solid var(--line)}
.tab{padding:9px 18px;border-radius:9px 9px 0 0;cursor:pointer;color:var(--muted);font-weight:600;font-size:13px;border:1px solid transparent;border-bottom:none}
.tab.active{background:var(--bg);color:var(--txt);border-color:var(--line)}
.wrap{padding:14px 22px;max-width:1560px;margin:0 auto}
#filterbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:9px;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
#chips{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:13px;min-height:22px}
.chip{background:#22344a;border:1px solid var(--line);color:#cfe0f0;border-radius:999px;padding:4px 10px;font-size:11px;cursor:pointer}
.chip.clearall{background:#3a2330;color:#ef9a8a;border-color:#5a3340}.chip:hover{filter:brightness(1.2)}
select,input{background:var(--panel2);color:var(--txt);border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:12px;outline:none}
input{min-width:200px}
.kpis{display:grid;gap:11px;margin-bottom:13px}.k8{grid-template-columns:repeat(8,1fr)}.k6{grid-template-columns:repeat(6,1fr)}.k4{grid-template-columns:repeat(4,1fr)}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:12px 13px}
.kpi.clic{cursor:pointer}.kpi.clic:hover{border-color:var(--accent2)}
.kpi .l{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.4px}
.kpi .v{font-size:19px;font-weight:700;margin-top:4px}.kpi .d{font-size:10px;margin-top:2px;color:var(--muted)}
.grid{display:grid;gap:13px;margin-bottom:13px}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:1fr 1fr}
.card{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px}
.card h3{margin:0 0 9px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.hint{text-transform:none;color:#5a6b7d;font-weight:400;letter-spacing:0}
.cb{position:relative;height:225px}
.tablecard{background:var(--panel);border:1px solid var(--line);border-radius:11px;overflow:hidden;margin-bottom:13px}
.tablecard .top{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line)}
.tablecard h3{margin:0;font-size:13px}.count{color:var(--muted);font-size:11px}
.tbl{overflow:auto;max-height:520px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--line)}
th{position:sticky;top:0;background:var(--panel2);color:var(--muted);font-weight:600;cursor:pointer;z-index:2;font-size:10px;text-transform:uppercase}
td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
tbody tr{cursor:pointer}tr:hover td{background:#1a2937}
.pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.s-Activo{background:rgba(31,157,107,.15);color:#43c98e}.s-Enseguimiento{background:rgba(47,129,247,.15);color:#5ea2ff}
.s-Enriesgo{background:rgba(224,163,37,.15);color:#f0c04a}.s-Inactivo{background:rgba(224,83,61,.15);color:#ef7a66}
.s-Sincompra{background:rgba(138,160,182,.15);color:#a9bdd2}.s-Complementario{background:rgba(138,160,182,.12);color:#8aa0b6}
.tag{display:inline-block;padding:1px 7px;border-radius:6px;font-size:10px;background:rgba(47,129,247,.12);color:#7fb0ff}
.tag.tg{background:rgba(224,163,37,.15);color:#f0c04a}
.t-up{color:#43c98e}.t-down{color:#ef7a66}.t-flat{color:#8aa0b6}.muted{color:var(--muted)}
.roi-hi{color:#43c98e;font-weight:700}.roi-mid{color:#f0c04a}.roi-lo{color:#ef7a66}
.acc{max-width:240px;white-space:normal;color:#c7d6e5;font-size:11px}
.ficha{margin-bottom:13px}.ficha select{min-width:340px;margin-bottom:6px}
.fichagrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.fl{color:var(--muted);font-size:10px;text-transform:uppercase}.fv{font-size:15px;font-weight:700;margin-top:2px}
/* ---- MODAL ---- */
#modal{position:fixed;inset:0;background:rgba(6,11,17,.72);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:36px 18px;overflow:auto}
#modal.show{display:flex}
.modalbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;max-width:1320px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.5)}
.modaltop{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);border-radius:14px 14px 0 0;z-index:3}
.modaltop h2{margin:0;font-size:14px}
#modalClose{background:#22344a;border:1px solid var(--line);color:var(--muted);border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px}
#modalBody{padding:16px 18px}
.mhead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px}
.mtitle{font-size:18px;font-weight:800}.msub{color:var(--muted);font-size:12px;margin-top:5px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.mbtn{background:var(--accent2);border:none;color:#fff;border-radius:9px;padding:9px 14px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.mbtn:hover{filter:brightness(1.08)}
.mkpis{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:14px}
.mk{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px 13px}
.mk .l{color:var(--muted);font-size:10px;text-transform:uppercase}.mk .v{font-size:19px;font-weight:700;margin-top:3px}.mk .d{font-size:10px;color:var(--muted)}
.mcmp{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.cmpcard{background:linear-gradient(180deg,#19273600,#1c2a3a);border:1px solid var(--line);border-radius:11px;padding:13px 15px}
.cmpcard .ct{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:9px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px dashed #25364a}.crow span{color:var(--muted)}.crow b{font-size:15px}
.cdelta{margin-top:9px;font-size:13px}
.sublbl{font-size:9px;color:#6b7f93;font-weight:400;margin-top:2px;text-align:right}
.dlt{font-weight:700}.dlt.up{color:#43c98e}.dlt.down{color:#ef7a66}.dlt.flat{color:#8aa0b6}
.mtbl{overflow:auto;border:1px solid var(--line);border-radius:10px}
.mtbl table{font-size:11px}.mtbl th{background:#1c2a3a;cursor:default}
.mtbl th.grp{text-align:center;color:#7fb0ff;background:#1a2737}
.mtbl td.sep,.mtbl th.sep{border-left:2px solid #2c4258}
@media(max-width:1200px){.k8,.k6{grid-template-columns:repeat(3,1fr)}.k4{grid-template-columns:repeat(2,1fr)}.g3,.g2{grid-template-columns:1fr}.fichagrid{grid-template-columns:repeat(2,1fr)}.mkpis{grid-template-columns:repeat(2,1fr)}.mcmp{grid-template-columns:1fr}}

.trendcard{margin-bottom:13px}
.trendhead{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.trendhead h3{margin:0}
.trendctrl{display:flex;gap:10px;align-items:center}
.trendctrl select{min-width:240px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.segb{background:var(--panel2);color:var(--muted);border:none;padding:7px 12px;cursor:pointer;font-size:12px}
.segb.on{background:var(--accent2);color:#fff}

#tip{position:fixed;z-index:100;display:none;max-width:270px;background:#0b1622;border:1px solid var(--line);color:#cfe0f0;padding:8px 11px;border-radius:8px;font-size:11px;line-height:1.45;box-shadow:0 10px 28px rgba(0,0,0,.55);pointer-events:none}
[data-tip]{cursor:help;border-bottom:1px dotted rgba(138,160,182,.45)}
.pill[data-tip]{border-bottom:none}
</style></head><body>

/* ---------- carga vía Apps Script ---------- */
function jsonp(url){return new Promise((res,rej)=>{const cb='__cb'+Math.random().toString(36).slice(2);
  window[cb]=d=>{res(d); try{delete window[cb]}catch(e){} s.remove();};
  const s=document.createElement('script'); s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
  s.onerror=()=>{rej(); s.remove();}; setTimeout(()=>rej('timeout'),12000); document.body.appendChild(s);});}

async function cargarDatos(){

function uniq(k){return [...new Set(DATA.map(d=>d[k]).filter(v=>v!=null&&v!==''))].sort();}
function applyFilters(rows){
  return rows.filter(d=>{
    if(st.cliente && d[F.razon]!==st.cliente) return false;
    if(st.q){const t=((d[F.razon]||'')+' '+(d[F.cliente]||'')).toLowerCase(); if(!t.includes(st.q.toLowerCase())) return false;}
    if(st.status && d[F.status]!==st.status) return false;
    if(st.tend && d[F.tend]!==st.tend) return false;
    if(st.rent && d[F.rentable]!==st.rent) return false;
    if(st.equipo && d[F.desc]!==st.equipo) return false;
    if(st.recup && d[F.recup]!==st.recup) return false;
    if(st.tipo && tipoEq(d)!==st.tipo) return false;
    if(st.ejec && d[F.ejec]!==st.ejec) return false;
    if(st.zona && fmtZona(d[F.zona])!==st.zona) return false;
    if(st.grupo && d[F.grupo]!==st.grupo) return false;
    if(st.comod==='con' && sinComodato(d)) return false;
    if(st.comod==='sin' && !sinComodato(d)) return false;
    return true;
  });
}
function countBy(rows,k){const m={}; rows.forEach(d=>{const v=d[k]||'—'; m[v]=(m[v]||0)+1;}); return m;}
function sumBy(rows,k,kv){const m={}; rows.forEach(d=>{const g=d[k]||'—'; m[g]=(m[g]||0)+num(d[kv]);}); return m;}
function sortRows(rows){
  return [...rows].sort((a,b)=>{
    let x=a[st.sort],y=b[st.sort];
    const nx=parseFloat(String(x).replace(/[^0-9.\-]/g,'')), ny=parseFloat(String(y).replace(/[^0-9.\-]/g,''));
    if(!isNaN(nx)&&!isNaN(ny)&&String(x).match(/[0-9]/)&&String(y).match(/[0-9]/)) return (nx-ny)*st.dir;
    return String(x||'').localeCompare(String(y||''),'es')*st.dir;
  });
}

/* ---------- gráfica evolución mensual: Facturación vs Comodato ---------- */
function serieAgg(cliCod, metric, useFilter, equipoCod){
  let keyset=null, cliset=null;
  if(useFilter){
    const ff=applyFilters(DATA);
    keyset=new Set(ff.map(d=>String(d[F.cliente])+'|'+String(d[F.mat])));
    cliset=new Set(ff.map(d=>String(d[F.cliente])));
  }
  const rows = SERIE.filter(r=>{
    if(cliCod && String(r.cliente)!==String(cliCod)) return false;
    if(equipoCod && String(r.codigo_equipo)!==String(equipoCod)) return false;
    if(keyset){
      const cod=r.codigo_equipo;
      if(cod!=null && cod!==''){ if(!keyset.has(String(r.cliente)+'|'+String(cod))) return false; }
      else { if(!cliset.has(String(r.cliente))) return false; }
    }
    return true;
  });
  const m={};
  rows.forEach(r=>{
    const p=String(r.periodo||'').slice(0,7); if(!/^\d{4}-\d{2}$/.test(p)) return;
    (m[p]=m[p]||{fac:0,com:0});
    m[p].fac += num(metric==='bolsas'? r.bolsas_mes : r.importe_mes);
    m[p].com += num(r.piezas_netas_mes);
  });
  const labels=Object.keys(m).sort();
  return {labels, fac:labels.map(l=>m[l].fac), com:labels.map(l=>m[l].com)};
}
function lblMes(p){const[y,mo]=p.split('-');const ms=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];return ms[+mo-1]+' '+y.slice(2);}

  const c=document.getElementById(canvasId); if(!c) return null;

  const facLbl = metric==='bolsas' ? 'Facturación (bolsas)' : 'Facturación ($)';
  return new Chart(c,{data:{labels:a.labels.map(lblMes),datasets:[
      {type:'line',label:facLbl,data:a.fac,borderColor:'#2f81f7',backgroundColor:'#2f81f7',yAxisID:'y',tension:.3,pointRadius:2,borderWidth:2,fill:false},

    ]},
    options:{maintainAspectRatio:false,interaction:{mode:'index',intersect:false},

      scales:{
        x:{ticks:{color:'#8aa0b6',font:{size:10},maxRotation:55,minRotation:55},grid:{display:false}},
        y:{position:'left',title:{display:true,text:facLbl,color:'#5ea2ff',font:{size:10}},ticks:{color:'#5ea2ff',callback:v=>metric==='bolsas'?v:fmtK(v)},grid:{color:'#26384c'}},

/* ---------- comparativo último vs penúltimo ---------- */
function cmp(act, prev){
  act=num(act); prev=num(prev);
  if(prev===0 && act===0) return '<span class="dlt flat">—</span>';
  if(prev===0 && act>0)   return '<span class="dlt up">▲ nuevo</span>';
  if(act===0 && prev>0)   return '<span class="dlt down">▼ −100%</span>';
  const p=Math.round((act-prev)/prev*100);
  const c=p>4?'up':(p<-4?'down':'flat'); const ar=p>4?'▲':(p<-4?'▼':'–');
  return `<span class="dlt ${c}">${ar} ${p>0?'+':''}${p}%</span>`;
}

      <div class="cmpcard">

    <div class="card" style="margin-bottom:14px;background:var(--panel2)"><h3 style="margin:0 0 8px">📈 Evolución mensual de este cliente</h3><div class="cb" style="height:240px"><canvas id="mTrendCanvas"></canvas></div></div>
    <div class="mtbl"><table><thead>
      <tr><th rowspan="2">Equipo</th><th rowspan="2">Tipo</th><th class="num" rowspan="2">Pzs</th><th rowspan="2">Status</th><th rowspan="2">Tend.</th><th class="num" rowspan="2">ROI</th>
          <th colspan="3" class="grp">Facturación (penúlt → últ)</th><th colspan="3" class="grp">Entrega comodato (penúlt → últ)</th><th rowspan="2">Acción</th></tr>
      <tr><th class="sep">Penúlt mes</th><th class="num">Imp penúlt</th><th class="num">Imp últ / Δ</th>

  document.getElementById('modal').classList.add('show');

}
function closeModal(){ const m=document.getElementById('modal'); if(m) m.classList.remove('show'); }
function openCanisterModal(desc, cod){
  const recs=DATA.filter(d=>String(d[F.desc])===String(desc));
  if(!recs.length) return;
  const tot=k=>recs.reduce((a,d)=>a+num(d[k]),0);
  const pzs=tot(F.cant), inv=tot(F.inv), fac=tot(F.fact), mar=tot(F.margen);
  const roi=inv?mar/inv:0;
  // distribución de ESTE canister por grupo de cliente y por status
  const gFacM={}; recs.forEach(d=>{const g=d[F.grupo]; if(!g) return; gFacM[g]=(gFacM[g]||0)+num(d[F.fact]);});
  const sFacM={}; recs.forEach(d=>{const ss=d[F.status]||'—'; sFacM[ss]=(sFacM[ss]||0)+num(d[F.fact]);});
  const stMapM={}; recs.forEach(d=>{const ss=d[F.status]||'—'; (stMapM[ss]=stMapM[ss]||{n:0,inv:0,fac:0,mar:0}); stMapM[ss].n++; stMapM[ss].inv+=num(d[F.inv]); stMapM[ss].fac+=num(d[F.fact]); stMapM[ss].mar+=num(d[F.margen]);});
  const resumenStatusHtml = `<div class="card" style="margin-bottom:14px"><h3 style="margin:0 0 8px">📌 Resumen por status</h3>
    <div class="tbl"><table><thead><tr><th>Status</th><th class="num">Equipos</th><th class="num">Inversión</th><th class="num">Facturación</th><th class="num">Margen</th><th class="num">ROI</th></tr></thead><tbody>
    ${Object.entries(stMapM).sort((a,b)=>b[1].fac-a[1].fac).map(([k,v])=>`<tr><td>${pill(k)}</td><td class="num">${v.n}</td><td class="num">${fmt(v.inv)}</td><td class="num">${fmt(v.fac)}</td><td class="num">${fmt(v.mar)}</td><td class="num">${roiCell(v.inv?v.mar/v.inv:0)}</td></tr>`).join('')}
    </tbody></table></div></div>`;
  const bolsas=BOLSAS.filter(b=>String(b.codigo_equipo)===String(cod)||String(b.descripcion_equipo)===String(desc))
                     .sort((a,b)=>num(b.importe_vendido)-num(a.importe_vendido));
  const bolsasHtml = bolsas.length ? `<div class="tbl"><table><thead><tr>
      <th>Bolsa</th><th class="num">Clientes</th><th class="num">Bolsas</th><th class="num">Importe</th><th class="num">Margen</th><th class="num">%Margen</th><th class="num">Precio prom</th></tr></thead><tbody>
      ${bolsas.map(d=>`<tr><td><b>${d.descripcion_consumible||d.codigo_consumible||''}</b></td>
        <td class="num">${num(d.num_clientes)}</td><td class="num">${num(d.bolsas_facturadas).toLocaleString('es-MX')}</td>
        <td class="num">${fmt(d.importe_vendido)}</td><td class="num">${fmt(d.margen_total)}</td>
        <td class="num">${num(d.pct_margen)}%</td><td class="num">${fmt(d.precio_prom_bolsa)}</td></tr>`).join('')}
      </tbody></table></div>`
    : '<p class="muted" style="margin:4px 0 0">Sin datos de bolsas para este equipo (conecta v_bolsas_resumen, o es un carrito sin facturación directa).</p>';
  const cli=[...recs].sort((a,b)=>num(b[F.fact])-num(a[F.fact]));
  const cliHtml=cli.map(d=>`<tr data-cli="${esc(d[F.razon])}">
      <td><b>${d[F.razon]||''}</b><br><span class="muted">${d[F.cliente]}</span></td>
      <td>${fmtZona(d[F.zona])||'—'}</td><td>${d[F.grupo]||'—'}</td>
      <td class="num">${d[F.cant]||0}</td><td class="num">${fmt(d[F.fact])}</td>
      <td class="num">${fmt(d[F.margen])}</td><td class="num">${roiCell(d[F.roi])}</td>
      <td>${pill(d[F.status])}</td><td>${tendIcon(d[F.tend])}</td></tr>`).join('');
  document.getElementById('modalBody').innerHTML=`
    <div class="mhead"><div><div class="mtitle">${desc}</div>
      <div class="msub">Código ${cod} · ${recs.length} clientes · ${pzs.toLocaleString('es-MX')} piezas en comodato</div></div></div>
    <div class="mkpis">
      <div class="mk"><div class="l">Inversión comodato</div><div class="v">${fmt(inv)}</div></div>
      <div class="mk"><div class="l">Facturación</div><div class="v">${fmt(fac)}</div></div>
      <div class="mk"><div class="l">Margen</div><div class="v">${fmt(mar)}</div><div class="d">${pct(mar,fac)} s/venta</div></div>
      <div class="mk"><div class="l">ROI</div><div class="v">${roi.toFixed(1)}x</div></div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <h3 style="margin:0 0 8px">📈 Evolución mensual — Facturación vs Comodato (este canister)</h3>
      <div class="cb" style="height:260px"><canvas id="canTrendCanvas"></canvas></div></div>
    <div class="card" style="margin-bottom:14px;background:var(--panel2)">
      <h3 style="margin:0 0 8px">💧 Facturación por bolsa (consumible)</h3>${bolsasHtml}</div>
    <div class="grid g2" style="margin-bottom:14px">
      <div class="card"><h3 style="margin:0 0 8px">🏷️ Facturación por grupo de cliente <span class="hint">(clic filtra)</span></h3><div class="cb" style="height:240px"><canvas id="canGrupoCanvas"></canvas></div></div>
      <div class="card"><h3 style="margin:0 0 8px">Facturación por status <span class="hint">(clic filtra)</span></h3><div class="cb" style="height:240px"><canvas id="canStatusCanvas"></canvas></div></div>
    </div>
    ${resumenStatusHtml}
    <div class="mtbl"><table><thead><tr>
      <th>Cliente</th><th>Zona</th><th>Grupo</th><th class="num">Pzs</th><th class="num">Facturación</th><th class="num">Margen</th><th class="num">ROI</th><th>Status</th><th>Tendencia</th>
    </tr></thead><tbody>${cliHtml}</tbody></table></div>`;
  document.getElementById('modal').classList.add('show');
  if(window.__canTrend){try{window.__canTrend.destroy()}catch(e){}}
  window.__canTrend=drawTrend('canTrendCanvas', null, trend.metric, null, cod);
  if(window.__canG){try{window.__canG.destroy()}catch(e){}}
  const gKm=Object.keys(gFacM).sort((a,b)=>gFacM[b]-gFacM[a]);
  const cgEl=document.getElementById('canGrupoCanvas');
  if(cgEl && gKm.length) window.__canG=new Chart(cgEl,{type:'bar',
    data:{labels:gKm,datasets:[{data:gKm.map(k=>gFacM[k]),backgroundColor:'#2f81f7',borderRadius:4}]},
    options:{...baseOpt,indexAxis:'y',
      onClick:(e,el)=>{if(el[0]){st.equipo=desc; st.grupo=gKm[el[0].index]; closeModal(); render();}},
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' '+fmt(c.parsed.x)}}},scales:axOpt}});
  if(window.__canS){try{window.__canS.destroy()}catch(e){}}
  const sKm=Object.keys(sFacM);
  const csEl=document.getElementById('canStatusCanvas');
  if(csEl && sKm.length) window.__canS=new Chart(csEl,{type:'doughnut',
    data:{labels:sKm,datasets:[{data:sKm.map(k=>sFacM[k]),backgroundColor:sKm.map(x=>PAL[x]||'#5a6b7d'),borderColor:'#16212e',borderWidth:2}]},
    options:{...baseOpt,cutout:'58%',
      onClick:(e,el)=>{if(el[0]){st.equipo=desc; st.status=sKm[el[0].index]; closeModal(); render();}},
      plugins:{legend:{position:'right',labels:baseOpt.plugins.legend.labels}}}});
}

/* ---------- filtros / nav ---------- */
function buildFilters(){
  document.getElementById('filterbar').style.display='flex';
  const opts=(k)=>uniq(k).map(v=>`<option>${v}</option>`).join('');
  document.getElementById('filterbar').innerHTML=`
    <input id="q" placeholder="🔍 Buscar cliente..." />
    <select id="fStatus"><option value="">Status</option>${opts(F.status)}</select>
    <select id="fTend"><option value="">Tendencia</option>${opts(F.tend)}</select>
    <select id="fRent"><option value="">Rentabilidad</option>${opts(F.rentable)}</select>
    <select id="fTipo"><option value="">Canister/Carrito</option><option>Canister</option><option>Carrito</option></select>
    <select id="fComod"><option value="">Con/Sin comodato</option><option value="con">Con comodato</option><option value="sin">Sin comodato</option></select>
    <select id="fEjec"><option value="">Ejecutivo</option>${opts(F.ejec)}</select>
    <select id="fZona"><option value="">Zona</option>${[...new Set(DATA.map(d=>fmtZona(d[F.zona])).filter(Boolean))].sort().map(v=>`<option>${v}</option>`).join('')}</select>
    <select id="fGrupo"><option value="">Grupo cliente</option>${opts(F.grupo)}</select>
    <select id="fEquipo"><option value="">Equipo / Canister</option>${opts(F.desc)}</select>
    ${st.view==='ger'?`<select id="fRecup"><option value="">Recuperable</option>${opts(F.recup)}</select>`:''}`;
  const q=document.getElementById('q'); q.value=st.q; q.oninput=e=>{st.q=e.target.value; renderChips(); refreshBody();};
  const setv=(id,k)=>{const e=document.getElementById(id); if(e){e.value=st[k]||''; e.onchange=ev=>{st[k]=ev.target.value; render();};}};
  setv('fStatus','status');setv('fTend','tend');setv('fRent','rent');setv('fTipo','tipo');setv('fComod','comod');setv('fEquipo','equipo');setv('fRecup','recup');setv('fEjec','ejec');setv('fZona','zona');setv('fGrupo','grupo');
}
function refreshBody(){ const rows=applyFilters(DATA);
  if(st.view==='dir') renderDir(rows); else if(st.view==='ger') renderGer(rows); else renderCom(rows); }
function render(){
  buildMaps();
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===st.view));
  buildFilters(); renderChips(); refreshBody();
}
/* delegación: clic en fila filtra por cliente; KPI/clicrow filtran por campo */
document.getElementById('app').addEventListener('click',e=>{
  const can=e.target.closest('tr[data-canister]'); if(can){openCanisterModal(can.dataset.canister, can.dataset.cod); return;}
  const kpi=e.target.closest('.kpi.clic'); if(kpi){const k=kpi.dataset.fk,v=kpi.dataset.fv; st[k]=(st[k]===v?'':v); render(); return;}
  const cr=e.target.closest('tr.clicrow,[data-fk]'); if(cr&&cr.dataset.fk){const k=cr.dataset.fk,v=cr.dataset.fv; st[k]=(st[k]===v?'':v); render(); return;}
  const tr=e.target.closest('tr[data-cli]'); if(tr){openModal(tr.dataset.cli); return;}
});
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{st.view=t.dataset.v; render();});
async function cargarBolsas(){
  if(!DATA_URL) return;
  const base=DATA_URL+(DATA_URL.includes('?')?'&':'?')+'tab='+encodeURIComponent(BOLSAS_TAB);
  try{ const r=await fetch(base); const j=await r.json(); if(Array.isArray(j)&&j.length){ BOLSAS=j; if(st.view==='dir') refreshBody(); return; } }catch(e){}
  try{ const j=await jsonp(base); if(Array.isArray(j)&&j.length){ BOLSAS=j; if(st.view==='dir') refreshBody(); } }catch(e){}
}
cargarDatos(); cargarSerie(); cargarBolsas();
setInterval(()=>{cargarDatos(); cargarSerie(); cargarBolsas();}, REFRESH_MS);

/* cierre del modal */
document.addEventListener('click',e=>{ if(e.target.id==='modal'||e.target.id==='modalClose') closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* tooltip flotante para [data-tip] */
(function(){
  const tip=document.createElement('div'); tip.id='tip'; document.body.appendChild(tip);
  document.addEventListener('mouseover',e=>{const t=e.target.closest('[data-tip]'); if(t){tip.textContent=t.getAttribute('data-tip'); tip.style.display='block';}});
  document.addEventListener('mousemove',e=>{ if(tip.style.display==='block'){ tip.style.left=Math.min(e.clientX+14, innerWidth-tip.offsetWidth-12)+'px'; tip.style.top=Math.min(e.clientY+16, innerHeight-tip.offsetHeight-12)+'px'; }});
  document.addEventListener('mouseout',e=>{ if(e.target.closest('[data-tip]')) tip.style.display='none'; });
})();
</script>
<script>
/* ===== Cambio de tema (oscuro <-> marca DEGASA) ===== */
(function(){
  const root=document.documentElement, btn=document.getElementById('themeBtn'), lbl=document.getElementById('themeLbl');
  function apply(t){
    if(t==='marca'){root.setAttribute('data-theme','marca'); lbl.textContent='Tema oscuro';}
    else{root.removeAttribute('data-theme'); lbl.textContent='Tema marca';}
    try{localStorage.setItem('degasa_theme',t);}catch(e){}
  }
  let saved='oscuro'; try{saved=localStorage.getItem('degasa_theme')||'oscuro';}catch(e){}
  apply(saved);
  btn.onclick=()=>apply(root.getAttribute('data-theme')==='marca'?'oscuro':'marca');
})();
</script>
